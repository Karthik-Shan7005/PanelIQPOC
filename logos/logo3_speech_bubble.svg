<svg width="400" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
    <linearGradient id="g3fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0.14"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="420" fill="#0a0d14" rx="24"/>

  <!-- Speech bubble body (rounded rect) -->
  <!-- Bubble path with tail at bottom-left -->
  <path d="M 80 80 Q 80 60 100 60 L 300 60 Q 320 60 320 80 L 320 220 Q 320 240 300 240 L 150 240 L 120 275 L 125 240 L 100 240 Q 80 240 80 220 Z"
    fill="url(#g3fill)" stroke="url(#g3)" stroke-width="4" filter="url(#glow3)"/>

  <!-- Terminal prompt inside bubble -->
  <!-- Prompt symbol > -->
  <text x="115" y="145" font-family="Consolas, Courier New, monospace" font-size="42" font-weight="700" fill="#00d4ff" opacity="0.9">&gt;_</text>

  <!-- Animated cursor line (static representation) -->
  <rect x="192" y="113" width="18" height="34" rx="2" fill="#7c6af7" opacity="0.8"/>

  <!-- SQL keyword hints -->
  <text x="115" y="185" font-family="Consolas, Courier New, monospace" font-size="12" fill="#7c6af7" opacity="0.6">SELECT * FROM KpiReports</text>
  <text x="115" y="205" font-family="Consolas, Courier New, monospace" font-size="12" fill="#6b7a99" opacity="0.5">WHERE market = 'APAC'...</text>

  <!-- Decorative dots top-left of bubble -->
  <circle cx="110" cy="90" r="4" fill="#1e2a40"/>
  <circle cx="128" cy="90" r="4" fill="#1e2a40"/>
  <circle cx="146" cy="90" r="4" fill="#1e2a40"/>

  <!-- Small AI response bubble (right-aligned, smaller) -->
  <path d="M 160 292 Q 160 280 172 280 L 295 280 Q 307 280 307 292 L 307 330 Q 307 342 295 342 L 172 342 Q 160 342 160 330 Z"
    fill="#111828" stroke="#1e2a40" stroke-width="1.5"/>
  <text x="233" y="303" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#00e5a0">● Querying KpiReports...</text>
  <text x="233" y="320" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#6b7a99">324 rows · 6 columns</text>

  <!-- Wordmark -->
  <text x="200" y="375" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#e8edf5" font-weight="300" letter-spacing="1.5">Panel<tspan font-weight="800" fill="url(#g3)">IQ</tspan></text>
  <text x="200" y="399" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b7a99" letter-spacing="4">PANEL INTELLIGENCE</text>
</svg>
