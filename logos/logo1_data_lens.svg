<svg width="400" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
    <clipPath id="lens-clip">
      <circle cx="180" cy="170" r="95"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="420" fill="#0a0d14" rx="24"/>

  <!-- Bars clipped inside lens -->
  <g clip-path="url(#lens-clip)">
    <rect x="90" y="100" width="280" height="160" fill="#0d1525"/>
    <!-- Grid lines -->
    <line x1="90" y1="225" x2="275" y2="225" stroke="#1e2a40" stroke-width="1"/>
    <line x1="90" y1="205" x2="275" y2="205" stroke="#1e2a40" stroke-width="1"/>
    <line x1="90" y1="185" x2="275" y2="185" stroke="#1e2a40" stroke-width="1"/>
    <line x1="90" y1="165" x2="275" y2="165" stroke="#1e2a40" stroke-width="1"/>
    <line x1="90" y1="145" x2="275" y2="145" stroke="#1e2a40" stroke-width="1"/>
    <!-- Bars -->
    <rect x="108" y="205" width="26" height="32" fill="url(#bar1)" rx="3"/>
    <rect x="142" y="188" width="26" height="49" fill="url(#bar1)" rx="3" opacity="0.9"/>
    <rect x="176" y="170" width="26" height="67" fill="url(#bar2)" rx="3" opacity="0.9"/>
    <rect x="210" y="152" width="26" height="85" fill="url(#bar2)" rx="3"/>
    <!-- Trend line -->
    <polyline points="121,205 155,188 189,170 223,152" fill="none" stroke="#00e5a0" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
    <circle cx="121" cy="205" r="3" fill="#00e5a0" opacity="0.8"/>
    <circle cx="155" cy="188" r="3" fill="#00e5a0" opacity="0.8"/>
    <circle cx="189" cy="170" r="3" fill="#00e5a0" opacity="0.8"/>
    <circle cx="223" cy="152" r="3" fill="#00e5a0" opacity="0.8"/>
  </g>

  <!-- Lens ring -->
  <circle cx="180" cy="170" r="95" fill="none" stroke="url(#g1)" stroke-width="7" filter="url(#glow)"/>
  <!-- Inner lens ring subtle -->
  <circle cx="180" cy="170" r="95" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>

  <!-- Handle -->
  <line x1="256" y1="248" x2="305" y2="302" stroke="url(#g1)" stroke-width="14" stroke-linecap="round"/>
  <!-- Handle highlight -->
  <line x1="256" y1="248" x2="305" y2="302" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.15"/>

  <!-- Wordmark -->
  <text x="200" y="358" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#e8edf5" font-weight="300" letter-spacing="1.5">Panel<tspan font-weight="800" fill="url(#g1)">IQ</tspan></text>
  <text x="200" y="382" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b7a99" letter-spacing="4" font-weight="400">PANEL INTELLIGENCE</text>
</svg>
