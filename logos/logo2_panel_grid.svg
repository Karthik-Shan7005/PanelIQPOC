<svg width="400" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
    <linearGradient id="g2v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="420" fill="#0a0d14" rx="24"/>

  <!-- Glow behind center square -->
  <rect x="164" y="144" width="72" height="72" rx="12" fill="#00d4ff" opacity="0.12" filter="url(#softglow)"/>

  <!-- 3x3 Grid of squares -->
  <!-- Row 1 -->
  <rect x="92"  y="80"  width="66" height="66" rx="10" fill="#111828" stroke="#1e2a40" stroke-width="1.5"/>
  <rect x="167" y="80"  width="66" height="66" rx="10" fill="#111828" stroke="#1e2a40" stroke-width="1.5"/>
  <rect x="242" y="80"  width="66" height="66" rx="10" fill="#111828" stroke="#1e2a40" stroke-width="1.5"/>

  <!-- Small icons in row 1 squares -->
  <!-- Bar chart icon -->
  <rect x="108" y="118" width="7" height="14" rx="1.5" fill="#1e2a40"/>
  <rect x="119" y="110" width="7" height="22" rx="1.5" fill="#1e2a40"/>
  <rect x="130" y="104" width="7" height="28" rx="1.5" fill="#1e2a40"/>
  <!-- Line chart icon -->
  <polyline points="178,130 188,116 198,122 208,108 218,114" fill="none" stroke="#1e2a40" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pie chart icon (simplified) -->
  <circle cx="275" cy="113" r="14" fill="none" stroke="#1e2a40" stroke-width="2.5"/>
  <line x1="275" y1="113" x2="275" y2="99" stroke="#1e2a40" stroke-width="2.5"/>
  <line x1="275" y1="113" x2="289" y2="113" stroke="#1e2a40" stroke-width="2.5"/>

  <!-- Row 2 -->
  <rect x="92"  y="155" width="66" height="66" rx="10" fill="#111828" stroke="#1e2a40" stroke-width="1.5"/>

  <!-- CENTER square — gradient, glowing -->
  <rect x="167" y="155" width="66" height="66" rx="12" fill="url(#g2)" filter="url(#glow2)"/>
  <!-- Neural node inside center -->
  <circle cx="200" cy="188" r="10" fill="#0a0d14"/>
  <!-- Radiating connection lines -->
  <line x1="200" y1="168" x2="200" y2="178" stroke="#0a0d14" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="198" x2="200" y2="208" stroke="#0a0d14" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="188" x2="190" y2="188" stroke="#0a0d14" stroke-width="3" stroke-linecap="round"/>
  <line x1="210" y1="188" x2="220" y2="188" stroke="#0a0d14" stroke-width="3" stroke-linecap="round"/>
  <!-- Diagonal connections -->
  <line x1="186" y1="174" x2="193" y2="181" stroke="#0a0d14" stroke-width="2" stroke-linecap="round"/>
  <line x1="207" y1="181" x2="214" y2="174" stroke="#0a0d14" stroke-width="2" stroke-linecap="round"/>
  <circle cx="200" cy="188" r="4" fill="#0a0d14"/>

  <rect x="242" y="155" width="66" height="66" rx="10" fill="#111828" stroke="#1e2a40" stroke-width="1.5"/>

  <!-- Row 3 -->
  <rect x="92"  y="230" width="66" height="66" rx="10" fill="#111828" stroke="#1e2a40" stroke-width="1.5"/>
  <rect x="167" y="230" width="66" height="66" rx="10" fill="#111828" stroke="#1e2a40" stroke-width="1.5"/>
  <rect x="242" y="230" width="66" height="66" rx="10" fill="#111828" stroke="#1e2a40" stroke-width="1.5"/>

  <!-- Dashed connecting lines from center to adjacent cells -->
  <line x1="200" y1="155" x2="200" y2="146" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="200" y1="221" x2="200" y2="230" stroke="#7c6af7" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="167" y1="188" x2="158" y2="188" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="233" y1="188" x2="242" y2="188" stroke="#7c6af7" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="200" y="348" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#e8edf5" font-weight="300" letter-spacing="1.5">Panel<tspan font-weight="800" fill="url(#g2)">IQ</tspan></text>
  <text x="200" y="372" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b7a99" letter-spacing="4">PANEL INTELLIGENCE</text>
</svg>
