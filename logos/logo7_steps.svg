<svg width="400" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
    <linearGradient id="g7h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="420" fill="#0a0d14" rx="24"/>

  <!-- Shadow/glow behind steps -->
  <rect x="82" y="188" width="236" height="68" rx="8" fill="#00d4ff" opacity="0.04" filter="url(#glow7)"/>

  <!-- Step 1 (lowest) -->
  <rect x="82" y="228" width="50" height="28" rx="6" fill="#00d4ff" opacity="0.45"/>
  <rect x="82" y="228" width="50" height="28" rx="6" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>

  <!-- Step 2 -->
  <rect x="140" y="198" width="50" height="58" rx="6" fill="#00d4ff" opacity="0.60"/>
  <rect x="140" y="198" width="50" height="58" rx="6" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>

  <!-- Step 3 -->
  <rect x="198" y="163" width="50" height="93" rx="6" fill="#7c6af7" opacity="0.70"/>
  <rect x="198" y="163" width="50" height="93" rx="6" fill="none" stroke="#7c6af7" stroke-width="1" opacity="0.8"/>

  <!-- Step 4 (highest) — glowing -->
  <rect x="256" y="120" width="50" height="136" rx="6" fill="url(#g7)" filter="url(#glow7)" opacity="0.9"/>

  <!-- Staircase connector line -->
  <polyline points="107,228 107,256 140,256 140,198 165,198 165,256 198,256 198,163 223,163 223,256 256,256 256,120 281,120"
    fill="none" stroke="url(#g7h)" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Rising arrow on top of last bar -->
  <line x1="281" y1="118" x2="281" y2="88" stroke="url(#g7h)" stroke-width="3" stroke-linecap="round" filter="url(#glow7)"/>
  <polygon points="281,76 272,96 290,96" fill="url(#g7h)" filter="url(#glow7)"/>

  <!-- Value labels on top of bars -->
  <text x="107" y="222" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#6b7a99">Q1</text>
  <text x="165" y="192" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#6b7a99">Q2</text>
  <text x="223" y="157" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#6b7a99">Q3</text>
  <text x="281" y="114" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#00d4ff">Q4</text>

  <!-- Baseline -->
  <line x1="72" y1="256" x2="328" y2="256" stroke="#1e2a40" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text x="200" y="310" text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#e8edf5" font-weight="300" letter-spacing="1.5">Panel<tspan font-weight="800" fill="url(#g7)">IQ</tspan></text>
  <text x="200" y="333" text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b7a99" letter-spacing="4">PANEL INTELLIGENCE</text>
</svg>
