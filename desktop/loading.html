<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>PanelIQ — Starting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0d14;
      color: #e8edf5;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo-mark {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      filter: drop-shadow(0 0 12px #00d4ff55);
    }

    .wordmark {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .wordmark span {
      font-weight: 800;
      background: linear-gradient(90deg, #00d4ff, #7c6af7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 11px;
      color: #6b7a99;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .spinner-track {
      width: 200px;
      height: 3px;
      background: #1e2a40;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .spinner-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #00d4ff, #7c6af7);
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .status {
      font-size: 11px;
      color: #6b7a99;
      letter-spacing: 0.5px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo-mark">
    <svg width="56" height="44" viewBox="55 55 290 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#00d4ff"/>
          <stop offset="100%" stop-color="#7c6af7"/>
        </linearGradient>
        <filter id="gw8c">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="gw8s">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Connection lines centre to outer -->
      <g stroke="#1e2a40" stroke-width="1.5" opacity="0.8">
        <line x1="200" y1="175" x2="200" y2="92"/>
        <line x1="200" y1="175" x2="275" y2="120"/>
        <line x1="200" y1="175" x2="308" y2="196"/>
        <line x1="200" y1="175" x2="272" y2="248"/>
        <line x1="200" y1="175" x2="128" y2="248"/>
        <line x1="200" y1="175" x2="92"  y2="196"/>
        <line x1="200" y1="175" x2="125" y2="120"/>
      </g>
      <!-- Outer-to-outer dashed -->
      <g stroke="#1e2a40" stroke-width="1" opacity="0.4" stroke-dasharray="4,3">
        <line x1="200" y1="92"  x2="275" y2="120"/>
        <line x1="275" y1="120" x2="308" y2="196"/>
        <line x1="308" y1="196" x2="272" y2="248"/>
        <line x1="272" y1="248" x2="128" y2="248"/>
        <line x1="128" y1="248" x2="92"  y2="196"/>
        <line x1="92"  y1="196" x2="125" y2="120"/>
        <line x1="125" y1="120" x2="200" y2="92"/>
      </g>
      <!-- Glowing accent lines -->
      <line x1="200" y1="175" x2="275" y2="120" stroke="url(#lg)" stroke-width="2" opacity="0.5"/>
      <line x1="200" y1="175" x2="308" y2="196" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
      <line x1="200" y1="175" x2="200" y2="92"  stroke="#7c6af7" stroke-width="2" opacity="0.4"/>
      <!-- Outer nodes -->
      <g filter="url(#gw8s)">
        <circle cx="200" cy="92"  r="9" fill="#7c6af7" opacity="0.85"/>
        <circle cx="275" cy="120" r="9" fill="#00d4ff" opacity="0.85"/>
        <circle cx="308" cy="196" r="9" fill="#00d4ff" opacity="0.7"/>
        <circle cx="272" cy="248" r="9" fill="#7c6af7" opacity="0.7"/>
        <circle cx="128" cy="248" r="9" fill="#7c6af7" opacity="0.7"/>
        <circle cx="92"  cy="196" r="9" fill="#00d4ff" opacity="0.7"/>
        <circle cx="125" cy="120" r="9" fill="#7c6af7" opacity="0.85"/>
      </g>
      <!-- Inner dots -->
      <g fill="#0a0d14">
        <circle cx="200" cy="92"  r="4"/>
        <circle cx="275" cy="120" r="4"/>
        <circle cx="308" cy="196" r="4"/>
        <circle cx="272" cy="248" r="4"/>
        <circle cx="128" cy="248" r="4"/>
        <circle cx="92"  cy="196" r="4"/>
        <circle cx="125" cy="120" r="4"/>
      </g>
      <!-- Central node -->
      <circle cx="200" cy="175" r="28" fill="url(#lg)" filter="url(#gw8c)"/>
      <circle cx="200" cy="175" r="18" fill="#0a0d14"/>
      <!-- Mini panel grid inside centre -->
      <g transform="translate(189, 164)">
        <rect x="0"  y="0"  width="6" height="6" rx="1" fill="#1e2a40"/>
        <rect x="8"  y="0"  width="6" height="6" rx="1" fill="#1e2a40"/>
        <rect x="16" y="0"  width="6" height="6" rx="1" fill="#1e2a40"/>
        <rect x="0"  y="8"  width="6" height="6" rx="1" fill="#1e2a40"/>
        <rect x="8"  y="8"  width="6" height="6" rx="1" fill="url(#lg)"/>
        <rect x="16" y="8"  width="6" height="6" rx="1" fill="#1e2a40"/>
        <rect x="0"  y="16" width="6" height="6" rx="1" fill="#1e2a40"/>
        <rect x="8"  y="16" width="6" height="6" rx="1" fill="#1e2a40"/>
        <rect x="16" y="16" width="6" height="6" rx="1" fill="#1e2a40"/>
      </g>
    </svg>
  </div>
  <div class="wordmark">Panel<span>IQ</span></div>
  <div class="tagline">Panel Intelligence</div>
  <div class="spinner-track">
    <div class="spinner-bar"></div>
  </div>
  <div class="status">Starting analytics engine...</div>
</body>
</html>
