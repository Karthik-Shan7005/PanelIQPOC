<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fv-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
    <filter id="fv-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#111828"/>

  <!-- 3x3 grid -->
  <rect x="8"  y="8"  width="24" height="24" rx="4" fill="#1e2a40"/>
  <rect x="38" y="8"  width="24" height="24" rx="4" fill="#1e2a40"/>
  <rect x="68" y="8"  width="24" height="24" rx="4" fill="#1e2a40"/>

  <rect x="8"  y="38" width="24" height="24" rx="4" fill="#1e2a40"/>
  <!-- Centre cell — gradient glowing -->
  <rect x="38" y="38" width="24" height="24" rx="5" fill="url(#fv-grad)" filter="url(#fv-glow)"/>
  <rect x="68" y="38" width="24" height="24" rx="4" fill="#1e2a40"/>

  <rect x="8"  y="68" width="24" height="24" rx="4" fill="#1e2a40"/>
  <rect x="38" y="68" width="24" height="24" rx="4" fill="#1e2a40"/>
  <rect x="68" y="68" width="24" height="24" rx="4" fill="#1e2a40"/>

  <!-- Neural node -->
  <circle cx="50" cy="50" r="5.5" fill="#0a0d14"/>
  <line x1="50" y1="40"   x2="50" y2="44.5" stroke="#0a0d14" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="55.5" x2="50" y2="60"   stroke="#0a0d14" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="50"   x2="44.5" y2="50" stroke="#0a0d14" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="55.5" y1="50" x2="60" y2="50"   stroke="#0a0d14" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="2.2" fill="#0a0d14"/>
</svg>
